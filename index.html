<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日语学习 - 单词小测验</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <!-- Progress Bar -->
        <header class="header">
            <button class="close-btn" aria-label="关闭">✕</button>
            <div class="progress-bar-container">
                <div class="progress-bar" id="progress-bar" style="width: 0%;"></div>
            </div>
        </header>

        <!-- Quiz Area -->
<main class="quiz-area" id="quiz-area">
            
<div id="range-selector">
    <button class="option-btn" onclick="swapRange('basic')">動詞、形容詞、趣味、名詞1</button>
    
    <button class="option-btn" onclick="swapRange('others')">名詞2、時間、副詞、理由</button>
</div>

            <div id="quiz-content" class="hidden">
                <h1 class="question-prompt">请选择正确的中文意思</h1>

                <div class="flashcard">
                    <div class="ruby-text" id="furigana"></div>
                    <div class="kanji-text" id="kanji"></div>
                    <button class="audio-btn" id="audio-btn" aria-label="播放读音">
                        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
                            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
                        </svg>
                    </button>
                </div>

                <div class="options-grid" id="options-grid">
                    </div>
            </div>
        </main>    
<div id="reorder-container" class="hidden" style="margin-bottom: 20px;">
    <div id="selected-chips" style="min-height: 60px; border-bottom: 2px solid #e5e5e5; margin-bottom: 20px; padding: 10px; display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; background: #fdfdfd; border-radius: 10px;">
    </div>
    <div id="word-chips" style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;">
    </div>
</div>
      <div id="results-area" class="hidden">
    <h2>学習完了！お疲れ様！</h2>
    <img id="result-main-img" src="images/finish.png" alt="congrats" style="width: 300px; height: auto; display: block; margin: 20px auto;">
    
    <button id="restart-btn" class="action-btn">再来一次</button>
</div>

        <!-- Footer / Action Area -->
        <footer class="footer" id="footer">
            <div class="feedback-container hidden" id="feedback-container">
                <img id="feedback-img" src="" alt="feedback"
                    style="width: 200px; height: auto; object-fit: contain; margin-bottom: 15px; border-radius: 10px;">
                <div class="feedback-content">
                    <div class="feedback-icon" id="feedback-icon"></div>
                    <div class="feedback-text">
                        <h3 id="feedback-title">正确！</h3>
                        <p id="feedback-correct-answer" class="hidden">正确答案：<span></span></p>
                    </div>
                </div>
            </div>
            <button class="action-btn" id="action-btn" disabled>检查</button>
        </footer>
    </div>
    <script src="script.js"></script>
</body>

</html>
